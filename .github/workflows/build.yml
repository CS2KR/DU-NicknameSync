name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/DU-NicknameSync.csproj

      - name: Build
        run: dotnet build src/DU-NicknameSync.csproj -c Release --no-restore

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: DU-NicknameSync
          path: |
            src/bin/Release/net8.0/DU-NicknameSync.dll
            src/bin/Release/net8.0/DU-NicknameSync.pdb
            src/bin/Release/net8.0/DU-NicknameSync.deps.json
            lang/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build Release
        run: dotnet build src/DU-NicknameSync.csproj -c Release

      - name: Prepare release
        run: |
          mkdir -p release/lang
          cp src/bin/Release/net8.0/DU-NicknameSync.dll release/
          cp src/bin/Release/net8.0/DU-NicknameSync.pdb release/
          cp src/bin/Release/net8.0/DU-NicknameSync.deps.json release/
          cp lang/*.json release/lang/

      - name: Zip release
        run: cd release && zip -r ../DU-NicknameSync-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: DU-NicknameSync-${{ github.ref_name }}.zip
          generate_release_notes: true
